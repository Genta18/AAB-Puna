<!DOCTYPE html>
<html lang="sq" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Konkurset Publike – eKonkursi</title>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    .konkurs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
    .konkurs-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:24px;transition:var(--transition);position:relative;overflow:hidden}
    .konkurs-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--accent)}
    .konkurs-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px}
    .konkurs-kategoria{font-size:11px;font-weight:700;color:var(--primary-light);text-transform:uppercase;letter-spacing:0.5px;background:var(--bg2);padding:3px 10px;border-radius:20px}
    [data-theme="dark"] .konkurs-kategoria{color:#60a5fa;background:rgba(59,130,246,0.15)}
    .konkurs-pozita{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px}
    .konkurs-inst{font-size:13px;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:6px}
    .konkurs-meta{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
    .konkurs-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
    .konkurs-meta-item strong{color:var(--text);font-size:13px}
    .konkurs-actions{display:flex;gap:10px;align-items:center}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
    .empty-state .icon{font-size:56px;margin-bottom:16px}
    .empty-state h3{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px}
    .pagination{display:flex;justify-content:center;gap:8px;margin-top:32px;flex-wrap:wrap}
    .page-btn{width:38px;height:38px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-weight:600;font-size:14px;transition:var(--transition)}
    .page-btn:hover,.page-btn.active{background:var(--primary);color:white;border-color:var(--primary)}
    [data-theme="dark"] .page-btn:hover,.page-btn.active{background:var(--primary-light);border-color:var(--primary-light)}
    .results-count{color:var(--text2);font-size:14px;margin-bottom:16px}
  </style>
</head>
<body>
<header class="header">
  <a href="index.html" class="logo">e<span>Konkursi</span></a>
  <nav class="nav" id="mainNav">
    <a href="dashboard.html">Dashboard</a>
    <a href="konkurset.html" class="active">Konkurset</a>
    <a href="rezultatet.html">Rezultatet</a>
    <a href="ankesat.html">Ankesat</a>
  </nav>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="theme-toggle" id="themeToggle">🌙</button>
    <button class="hamburger" id="hamburger">☰</button>
  </div>
</header>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebarAvatar">?</div>
      <div class="sidebar-name" id="sidebarName">Vizitor</div>
      <div class="sidebar-role" id="sidebarRole">—</div>
    </div>
    <hr class="sidebar-divider"/>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
      <a href="konkurset.html" class="active"><span class="icon">📋</span> Konkurset</a>
      <a href="apliko.html"><span class="icon">✍️</span> Apliko</a>
      <hr class="sidebar-divider"/>
      <a href="rezultatet.html"><span class="icon">🏆</span> Rezultatet</a>
      <a href="ankesat.html"><span class="icon">⚖️</span> Ankesat</a>
      <hr class="sidebar-divider"/>
      <a href="index.html" id="logoutBtn"><span class="icon">🚪</span> Dilni</a>
    </nav>
  </aside>

  <main class="main-content">
    <div style="margin-bottom:24px">
      <h1 class="section-title">📋 Konkurset Publike</h1>
      <p class="section-subtitle">Shiko dhe apliko për konkurset e hapura sipas institucionit ose kategorisë</p>
    </div>

    <!-- SEARCH & FILTER -->
    <div class="search-bar">
      <input class="search-input" type="text" id="searchInput" placeholder="Kërko pozitë ose institucion..." oninput="filterKonkurset()"/>
      <select class="filter-select" id="filterStatus" onchange="filterKonkurset()">
        <option value="te_gjitha">Të gjitha statuset</option>
        <option value="aktiv">Aktiv</option>
        <option value="shqyrtim">Në shqyrtim</option>
        <option value="mbyllur">Mbyllur</option>
      </select>
      <select class="filter-select" id="filterKategoria" onchange="filterKonkurset()">
        <option value="te_gjitha">Të gjitha kategoritë</option>
        <option value="Sherbim Civil">Shërbim Civil</option>
        <option value="Administrativ">Administrativ</option>
        <option value="Financa">Financa</option>
        <option value="Teknologji">Teknologji</option>
        <option value="Juridik">Juridik</option>
        <option value="Inspektim">Inspektim</option>
      </select>
      <select class="filter-select" id="sortBy" onchange="filterKonkurset()">
        <option value="afati">Rendit: Afati</option>
        <option value="aplikime">Rendit: Aplikime</option>
      </select>
    </div>

    <div class="results-count" id="resultsCount"></div>
    <div class="konkurs-grid" id="konkursGrid"></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<!-- MODAL DETAJET -->
<div class="modal-overlay" id="modalDetaje">
  <div class="modal" style="max-width:620px">
    <div class="modal-header">
      <h2 class="modal-title" id="modalPozita">Detajet e Konkursit</h2>
      <button class="modal-close" onclick="closeModal('modalDetaje')">✕</button>
    </div>
    <div id="modalBody"></div>
    <div style="display:flex;gap:12px;margin-top:24px">
      <a id="modalAplikoBtn" href="apliko.html" class="btn btn-primary" style="flex:1;justify-content:center">✍️ Apliko Tani</a>
      <button onclick="closeModal('modalDetaje')" class="btn" style="background:var(--bg2);color:var(--text)">Mbyll</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
const PER_PAGE = 6;
let currentPage = 1;
let filteredList = [];

function filterKonkurset() {
  currentPage = 1;
  const search    = document.getElementById('searchInput').value;
  const statusi   = document.getElementById('filterStatus').value;
  const kategoria = document.getElementById('filterKategoria').value;
  const sort      = document.getElementById('sortBy').value;
  filteredList = DataAPI.getKonkurset({ search, statusi, kategoria, sort });
  renderKonkurset();
}

function renderKonkurset() {
  const grid   = document.getElementById('konkursGrid');
  const countEl= document.getElementById('resultsCount');
  const total  = filteredList.length;
  const start  = (currentPage - 1) * PER_PAGE;
  const page   = filteredList.slice(start, start + PER_PAGE);

  countEl.textContent = `${total} konkurs${total !== 1 ? 'e' : ''} u gjetën`;

  if (total === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">🔍</div>
      <h3>Asnjë konkurs nuk u gjet</h3>
      <p>Provo të ndryshosh filtrat e kërkimit</p>
    </div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  grid.innerHTML = page.map(k => {
    const cd = getCountdown(k.afati);
    const isAktiv = k.statusi === 'aktiv';
    return `<div class="konkurs-card animate-fade">
      <div class="konkurs-card-top">
        <span class="konkurs-kategoria">${k.kategoria}</span>
        ${statusBadge(k.statusi)}
      </div>
      <div class="konkurs-pozita">${k.pozita}</div>
      <div class="konkurs-inst">🏛️ ${k.institucioni}</div>
      <div class="konkurs-meta">
        <div class="konkurs-meta-item">📅 Afati: <strong class="countdown ${cd.cls}">${cd.text}</strong></div>
        <div class="konkurs-meta-item">👥 Aplikime: <strong>${k.aplikime}</strong></div>
        <div class="konkurs-meta-item">🎯 Vende: <strong>${k.vende}</strong></div>
        <div class="konkurs-meta-item">💰 Paga: <strong>${k.paga}</strong></div>
      </div>
      <div class="konkurs-actions">
        <button onclick="showDetaje(${k.id})" class="btn btn-sm" style="background:var(--bg2);color:var(--text);flex:1">📄 Detajet</button>
        ${isAktiv ? `<a href="apliko.html?id=${k.id}" class="btn btn-sm btn-primary" style="flex:1;justify-content:center">✍️ Apliko</a>` : ''}
      </div>
    </div>`;
  }).join('');

  renderPagination(total);
}

function renderPagination(total) {
  const pages = Math.ceil(total / PER_PAGE);
  const pgEl  = document.getElementById('pagination');
  if (pages <= 1) { pgEl.innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= pages; i++) {
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  pgEl.innerHTML = html;
}

function goPage(p) { currentPage = p; renderKonkurset(); window.scrollTo({top:0,behavior:'smooth'}); }

function showDetaje(id) {
  const k = DataAPI.getKonkursiById(id);
  if (!k) return;
  const cd = getCountdown(k.afati);
  document.getElementById('modalPozita').textContent = k.pozita;
  document.getElementById('modalAplikoBtn').href = `apliko.html?id=${id}`;
  document.getElementById('modalBody').innerHTML = `
    <div class="alert alert-info">🏛️ <strong>${k.institucioni}</strong> · ${k.kategoria}</div>
    <p style="font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:20px">${k.pershkrimi}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="stat-card blue" style="padding:16px"><div class="stat-label">Vende të lira</div><div class="stat-number" style="font-size:28px">${k.vende}</div></div>
      <div class="stat-card green" style="padding:16px"><div class="stat-label">Aplikime deri tani</div><div class="stat-number" style="font-size:28px">${k.aplikime}</div></div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:16px;font-size:14px">
      <div>📅 <strong>Afati:</strong> ${formatDate(k.afati)} <span class="countdown ${cd.cls}">(${cd.text})</span></div>
      <div>💰 <strong>Paga:</strong> ${k.paga}</div>
      <div>📌 <strong>Statusi:</strong> ${statusBadge(k.statusi)}</div>
    </div>`;
  openModal('modalDetaje');
}

// Init
filterKonkurset();
</script>
</body>
</html>
